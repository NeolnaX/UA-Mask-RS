name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.target }} binutils-${{ matrix.target }}
          echo "CARGO_TARGET_$(echo ${{ matrix.target }} | tr '-' '_')_LINKER=${{ matrix.target }}-gcc" >> $GITHUB_ENV

      - name: Build release
        run: |
          RUSTFLAGS="-C opt-level=3 -C lto" \
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir -p files
          mv target/${{ matrix.target }}/release/ua-mask files/UAmask-${{ matrix.artifact }}
          chmod +x files/UAmask-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UAmask-${{ matrix.artifact }}
          path: files/UAmask-${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}