name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: x86_64
            packages: ""
          - target: aarch64-unknown-linux-gnu
            artifact: aarch64
            packages: gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          - target: arm-unknown-linux-gnueabihf
            artifact: armv7
            packages: gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
          - target: mipsel-unknown-linux-gnu
            artifact: mipsel
            packages: gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu
          - target: mips-unknown-linux-gnu
            artifact: mips
            packages: gcc-mips-linux-gnu binutils-mips-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross compilation tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Build release
        env:
          CARGO_TARGET_${{ matrix.target }}_LINKER: ${{ matrix.target }}-linux-gnu-gcc
        run: |
          RUSTFLAGS="-C opt-level=3 -C lto" \
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir -p files
          mv target/${{ matrix.target }}/release/ua-mask files/UAmask-${{ matrix.artifact }}
          chmod +x files/UAmask-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UAmask-${{ matrix.artifact }}
          path: files/UAmask-${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}